<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Monitoring Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .header-panel { background: #5c6bc0; color: white; padding: 25px; border-radius: 0 0 15px 15px; text-align: center; }
        .table-container { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="header-panel shadow">
    <h4>📱 OTP মনিটরিং ড্যাশবোর্ড</h4>
    <p style="font-size: 0.8rem;">সক্রিয় প্রোফাইল: ৩০টি (IVACBD)</p>
</div>

<div class="container mt-3">
    <input type="text" id="searchInput" class="form-control mb-3" placeholder="মোবাইল নম্বর সার্চ...">
    
    <div class="table-container">
        <table class="table table-sm table-hover">
            <thead class="table-light">
                <tr>
                    <th>নম্বর</th>
                    <th>OTP</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="otpBody">
                <tr><td colspan="3" class="text-center">লোডিং...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function loadData() {
        fetch('/api/get_otps')
        .then(res => res.json())
        .then(data => {
            let html = "";
            let search = document.getElementById('searchInput').value;
            data.forEach(item => {
                if(search && !item.target.includes(search)) return;
                html += `<tr>
                    <td>${item.target}</td>
                    <td class="fw-bold text-primary">${item.message}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="del(${item.id})">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('otpBody').innerHTML = html;
        });
    }

    function del(id) {
        if(confirm('মুছে ফেলবেন?')) {
            fetch('/api/delete/' + id, {method: 'POST'}).then(() => loadData());
        }
    }

    setInterval(loadData, 5000);
    window.onload = loadData;
</script>
</body>
</html>
